<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Play chess against a self-built bot or a friend — full rules, timers, and more.">
  <title>Shatranj — Chess</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="apple-touch-icon" href="favicon.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="confetti-canvas"></canvas>

  <!-- Home Screen -->
  <div id="home-screen" class="screen">
    <h1>♟ Shatranj</h1>
    <div id="score-bar">
      <span>⬜ <b id="score-white">0</b></span>
      <span>Draws <b id="score-draws">0</b></span>
      <span>⬛ <b id="score-black">0</b></span>
    </div>
    <p>Choose a game mode</p>
    <button onclick="showDifficulty()">🤖 vs Bot</button>
    <button onclick="showTimeControl('friend')">👥 vs Friend</button>
    <div id="theme-bar">
      <span>Board Theme:</span>
      <div id="theme-btns">
        <button class="theme-btn active" onclick="setTheme('classic')" title="Classic">♟</button>
        <button class="theme-btn" onclick="setTheme('green')"   title="Green">🌿</button>
        <button class="theme-btn" onclick="setTheme('dark')"    title="Dark">🌑</button>
        <button class="theme-btn" onclick="setTheme('blue')"    title="Blue">🔷</button>
      </div>
    </div>
  </div>

  <!-- Difficulty Screen -->
  <div id="difficulty-screen" class="screen hidden">
    <h2>Select Difficulty</h2>
    <button onclick="showTimeControl('bot','easy')">🟢 Easy</button>
    <button onclick="showTimeControl('bot','medium')">🟡 Medium</button>
    <button onclick="showTimeControl('bot','hard')">🔴 Hard</button>
    <button onclick="showHome()">← Back</button>
  </div>

  <!-- Time Control Screen -->
  <div id="timecontrol-screen" class="screen hidden">
    <h2>Time Control</h2>
    <button onclick="startWithTime(1,0)">⚡ Bullet — 1 min</button>
    <button onclick="startWithTime(3,2)">🔥 Blitz — 3+2</button>
    <button onclick="startWithTime(5,3)">⏱ Blitz — 5+3</button>
    <button onclick="startWithTime(10,0)">🕐 Rapid — 10 min</button>
    <button onclick="startWithTime(0,0)">♾ No Timer</button>
    <button onclick="goBack()">← Back</button>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" class="screen hidden">
    <div id="top-bar">
      <button onclick="showHome()">← Menu</button>
      <div id="status-wrap">
        <div id="opening-name"></div>
        <div id="status">White's turn</div>
      </div>
      <div id="top-actions">
        <button class="icon-btn" onclick="showHint()"    title="Hint">💡</button>
        <button class="icon-btn" onclick="undoMove()"    title="Undo">↩</button>
        <button class="icon-btn" onclick="flipBoard()"   title="Flip">⇅</button>
        <button class="icon-btn" id="sound-btn" onclick="toggleSound()" title="Sound">🔊</button>
        <button class="icon-btn" onclick="offerDraw()"  title="Offer Draw">½</button>
        <button class="icon-btn danger" onclick="resign()" title="Resign">🏳</button>
      </div>
    </div>

    <!-- Keyboard nav hint -->
    <div id="nav-hint" class="hidden">← → to navigate  |  Esc to exit review</div>

    <div id="game-container">
      <div id="board-wrapper">
        <div id="black-info" class="player-info">
          <span id="black-label">⬛ Black</span>
          <span id="black-timer" class="timer">—</span>
        </div>
        <div id="board-container">
          <div id="eval-bar" title="Evaluation">
            <div id="eval-fill"></div>
            <span id="eval-num">0.0</span>
          </div>
          <div id="board"></div>
          <svg id="arrow-svg"></svg>
        </div>
        <div id="white-info" class="player-info">
          <span id="white-label">⬜ White</span>
          <span id="white-timer" class="timer active-timer">—</span>
        </div>
      </div>

      <div id="sidebar">
        <div id="mode-info"></div>
        <div id="material-bar">⚖ <span id="material-score">Equal</span></div>
        <div id="captured-bar">
          <div>⬛ <span id="black-captured">—</span></div>
          <div>⬜ <span id="white-captured">—</span></div>
        </div>
        <div id="bot-thinking" class="hidden">
          <span>Bot thinking</span><span class="dot-anim">...</span>
        </div>
        <div id="settings-bar">
          <label><input type="checkbox" id="auto-queen" onchange="toggleAutoQueen()"> Auto-Queen</label>
        </div>
        <div id="move-history">
          <h3>Move History <button class="tiny-btn" onclick="copyPGN()" title="Copy PGN">📋</button></h3>
          <ol id="move-list"></ol>
        </div>
        <div id="nav-buttons">
          <button class="nav-btn" onclick="navFirst()" title="First move">⏮</button>
          <button class="nav-btn" onclick="navPrev()"  title="Previous">◀</button>
          <button class="nav-btn" onclick="navNext()"  title="Next">▶</button>
          <button class="nav-btn" onclick="navLast()"  title="Latest">⏭</button>
        </div>
        <div id="keyboard-hint">⌨ ← → to review moves</div>
      </div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-screen" class="screen hidden">
    <div id="gameover-icon">🏆</div>
    <h2 id="gameover-text"></h2>
    <div id="gameover-score"></div>
    <button onclick="rematch()">▶ Play Again</button>
    <button onclick="showHome()">← Menu</button>
  </div>

  <!-- Promotion Modal -->
  <div id="promotion-modal" class="hidden">
    <div id="promotion-box">
      <p>Promote pawn to:</p>
      <div id="promotion-choices"></div>
    </div>
  </div>

  <!-- Draw offer dialog -->
  <div id="draw-dialog" class="hidden">
    <div id="draw-box">
      <p>Draw offered. Accept?</p>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:12px">
        <button onclick="acceptDraw()">✓ Accept</button>
        <button onclick="declineDraw()" style="background:#c0392b;color:white">✗ Decline</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
